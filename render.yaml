###############################################################################
# render.yaml — Render Blueprint for Flask Video Downloader Backend
# ===========================================================================
# CRITICAL: yt-dlp 2025+ requires Node.js for YouTube n-parameter challenge.
# We download the Node.js binary directly (no apt/NodeSource needed).
###############################################################################

services:
  - type: web
    name: video-downloader-backend
    runtime: python
    plan: free
    region: singapore

    # ── Build ──────────────────────────────────────────────────────────────
    # Strategy: Install Deno (recommended by yt-dlp) for YouTube JS challenges.
    # Deno is lightweight, enabled by default in yt-dlp, and needs no extra config.
    # Also install yt-dlp-ejs scripts for challenge solving.
    buildCommand: |
      set -e
      echo "=== Installing FFmpeg ==="
      apt-get update -qq && apt-get install -y --no-install-recommends ffmpeg ca-certificates curl unzip

      echo "=== Installing Deno (recommended JS runtime for yt-dlp) ==="
      DENO_DIR="/opt/render/project/src/.deno"
      mkdir -p "$DENO_DIR"
      curl -fsSL https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip -o /tmp/deno.zip
      unzip -o /tmp/deno.zip -d "$DENO_DIR"
      rm /tmp/deno.zip
      chmod +x "$DENO_DIR/deno"
      ln -sf "$DENO_DIR/deno" /usr/local/bin/deno

      echo "=== Verify Deno ==="
      deno --version

      echo "=== Installing Python deps ==="
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -U --pre "yt-dlp[default]"

      echo "=== Verify yt-dlp + EJS ==="
      python -c "import yt_dlp; print('yt-dlp:', yt_dlp.version.__version__)"
      python -c "import yt_dlp_ejs; print('yt-dlp-ejs:', yt_dlp_ejs.__version__)" || echo "WARNING: yt-dlp-ejs not found as separate package (may be bundled)"
      echo "=== Build complete ==="

    # ── Start ──────────────────────────────────────────────────────────────
    startCommand: "export PATH=/opt/render/project/src/.deno:$PATH && echo \"Deno: $(deno --version 2>/dev/null | head -1 || echo NOT_FOUND)\" && exec gunicorn -c gunicorn.conf.py app:app"

    # ── Health Check ───────────────────────────────────────────────────────
    healthCheckPath: /health

    autoDeploy: true

    # ── Environment Variables ──────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: FLASK_ENV
        value: "production"

      - key: SECRET_KEY
        generateValue: true

      - key: FRONTEND_URL
        sync: false

      - key: LOG_LEVEL
        value: "INFO"

      - key: TMP_DIR
        value: "/tmp/videodl"

      - key: MAX_VIDEO_SECONDS
        value: "3600"

      - key: MAX_FILE_MB
        value: "500"

      - key: FFMPEG_PATH
        value: "/usr/bin/ffmpeg"

      # Ensure Deno is in PATH at runtime
      - key: PATH
        value: "/opt/render/project/src/.deno:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
