###############################################################################
# render.yaml — Render Blueprint for Flask Video Downloader Backend
# ===========================================================================
# Place this file at the ROOT of your backend repository.
# Frontend is deployed separately on Vercel.
#
# CRITICAL: yt-dlp 2025+ REQUIRES Node.js to solve YouTube's n-parameter
# throttle challenge. Without it → TypeError: 'NoneType' object is not callable
###############################################################################

services:
  - type: web
    name: video-downloader-backend
    runtime: python
    plan: free
    region: singapore

    # ── Build ──────────────────────────────────────────────────────────────
    # 1. Install FFmpeg (for merging video+audio)
    # 2. Install Node.js 20 LTS from NodeSource (yt-dlp JS runtime)
    #    - Default Ubuntu repos have outdated/missing nodejs
    #    - NodeSource provides Node.js 20 LTS which yt-dlp supports
    # 3. Verify node is accessible
    # 4. Install Python deps + latest yt-dlp nightly
    buildCommand: |
      apt-get update -qq
      apt-get install -y --no-install-recommends ffmpeg ca-certificates curl gnupg
      mkdir -p /etc/apt/keyrings
      curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
      apt-get update -qq
      apt-get install -y --no-install-recommends nodejs
      echo "--- Node.js version ---"
      node --version
      echo "--- npm version ---"
      npm --version
      echo "--- FFmpeg ---"
      ffmpeg -version 2>&1 | head -1
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -U --pre "yt-dlp[default]"
      python -c "import yt_dlp; print('yt-dlp:', yt_dlp.version.__version__)"

    # ── Start ──────────────────────────────────────────────────────────────
    startCommand: gunicorn -c gunicorn.conf.py app:app

    # ── Health Check ───────────────────────────────────────────────────────
    healthCheckPath: /health

    autoDeploy: true

    # ── Environment Variables ──────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: FLASK_ENV
        value: "production"

      - key: SECRET_KEY
        generateValue: true

      # Set to your Vercel frontend URL after deploying frontend
      - key: FRONTEND_URL
        sync: false

      - key: LOG_LEVEL
        value: "INFO"

      - key: TMP_DIR
        value: "/tmp/videodl"

      - key: MAX_VIDEO_SECONDS
        value: "3600"

      - key: MAX_FILE_MB
        value: "500"

      - key: FFMPEG_PATH
        value: "/usr/bin/ffmpeg"
