###############################################################################
# render.yaml — Render Blueprint for Flask Video Downloader Backend
# ===========================================================================
# Docs: https://render.com/docs/blueprint-spec
#
# Place this file at the ROOT of your backend repository.
# Frontend is deployed separately on Vercel.
###############################################################################

services:
  - type: web
    name: video-downloader-backend
    runtime: python
    plan: free
    region: singapore

    # ── Build ──────────────────────────────────────────────────────────────
    # 1. Install FFmpeg system dependency (required by yt-dlp for merging)
    # 2. Upgrade pip
    # 3. Install Python packages from requirements.txt
    # 4. Install latest yt-dlp NIGHTLY (critical for YouTube compatibility)
    #    The nightly includes latest extractor fixes for PO tokens, etc.
    buildCommand: |
      apt-get update -qq && apt-get install -y --no-install-recommends ffmpeg
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -U --pre "yt-dlp[default]"

    # ── Start ──────────────────────────────────────────────────────────────
    startCommand: gunicorn -c gunicorn.conf.py app:app

    # ── Health Check ───────────────────────────────────────────────────────
    healthCheckPath: /health

    autoDeploy: true

    # ── Environment Variables ──────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: FLASK_ENV
        value: "production"

      - key: SECRET_KEY
        generateValue: true

      # Set to your Vercel frontend URL after deploying frontend
      - key: FRONTEND_URL
        sync: false

      - key: LOG_LEVEL
        value: "INFO"

      - key: TMP_DIR
        value: "/tmp/videodl"

      - key: MAX_VIDEO_SECONDS
        value: "3600"

      - key: MAX_FILE_MB
        value: "500"

      - key: FFMPEG_PATH
        value: "/usr/bin/ffmpeg"
