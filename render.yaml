###############################################################################
# render.yaml — Render Blueprint for Flask Video Downloader Backend
# ===========================================================================
# Place this file at the ROOT of your backend repository.
# Frontend is deployed separately on Vercel.
###############################################################################

services:
  - type: web
    name: video-downloader-backend
    runtime: python
    plan: free
    region: singapore

    # ── Build ──────────────────────────────────────────────────────────────
    # System dependencies:
    #   - ffmpeg: yt-dlp needs it to merge video+audio streams into MP4
    #   - nodejs + npm: yt-dlp 2025+ REQUIRES a JavaScript runtime to solve
    #     YouTube's n-parameter throttle challenge. Without Node.js you get:
    #       TypeError: 'NoneType' object is not callable
    #       at yt_dlp/utils/_jsruntime.py
    #   - ca-certificates: for HTTPS connections
    #
    # Python:
    #   - Install requirements.txt first (has yt-dlp[default]>=2025.06.30)
    #   - Then force-upgrade yt-dlp to the latest nightly (critical for YT)
    buildCommand: |
      apt-get update -qq
      apt-get install -y --no-install-recommends ffmpeg nodejs npm ca-certificates
      node --version || echo "WARNING: Node.js not available"
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -U --pre "yt-dlp[default]"
      python -c "import yt_dlp; print('yt-dlp version:', yt_dlp.version.__version__)"

    # ── Start ──────────────────────────────────────────────────────────────
    startCommand: gunicorn -c gunicorn.conf.py app:app

    # ── Health Check ───────────────────────────────────────────────────────
    healthCheckPath: /health

    autoDeploy: true

    # ── Environment Variables ──────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: FLASK_ENV
        value: "production"

      - key: SECRET_KEY
        generateValue: true

      # Set to your Vercel frontend URL after deploying frontend
      - key: FRONTEND_URL
        sync: false

      - key: LOG_LEVEL
        value: "INFO"

      - key: TMP_DIR
        value: "/tmp/videodl"

      - key: MAX_VIDEO_SECONDS
        value: "3600"

      - key: MAX_FILE_MB
        value: "500"

      - key: FFMPEG_PATH
        value: "/usr/bin/ffmpeg"
