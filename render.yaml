###############################################################################
# render.yaml — Render Blueprint for Flask Video Downloader Backend
# ===========================================================================
# CRITICAL: yt-dlp 2025+ requires Node.js for YouTube n-parameter challenge.
# We download the Node.js binary directly (no apt/NodeSource needed).
###############################################################################

services:
  - type: web
    name: video-downloader-backend
    runtime: python
    plan: free
    region: singapore

    # ── Build ──────────────────────────────────────────────────────────────
    # Strategy: Install Node.js into the persistent project directory so it
    # survives Render deploys. /opt/render/project/src/ is the working dir.
    buildCommand: |
      set -e
      echo "=== Installing FFmpeg ==="
      apt-get update -qq && apt-get install -y --no-install-recommends ffmpeg ca-certificates curl xz-utils

      echo "=== Installing Node.js 20 LTS ==="
      NODE_DIR="/opt/render/project/src/.node"
      mkdir -p "$NODE_DIR"
      curl -fsSL https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.xz -o /tmp/node.tar.xz
      tar -xJf /tmp/node.tar.xz -C "$NODE_DIR" --strip-components=1
      rm /tmp/node.tar.xz

      # Also create symlinks in /usr/local/bin for build-time
      ln -sf "$NODE_DIR/bin/node" /usr/local/bin/node
      ln -sf "$NODE_DIR/bin/npm" /usr/local/bin/npm
      ln -sf "$NODE_DIR/bin/npx" /usr/local/bin/npx

      echo "=== Verify Node.js ==="
      node --version

      echo "=== Installing Python deps ==="
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -U --pre "yt-dlp[default]"

      echo "=== Verify yt-dlp ==="
      python -c "import yt_dlp; print('yt-dlp:', yt_dlp.version.__version__)"
      echo "=== Build complete ==="

    # ── Start ──────────────────────────────────────────────────────────────
    # Verify Node.js availability before starting gunicorn
    startCommand: "export PATH=/opt/render/project/src/.node/bin:$PATH && echo \"Node: $(node --version 2>/dev/null || echo NOT_FOUND)\" && exec gunicorn -c gunicorn.conf.py app:app"

    # ── Health Check ───────────────────────────────────────────────────────
    healthCheckPath: /health

    autoDeploy: true

    # ── Environment Variables ──────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: FLASK_ENV
        value: "production"

      - key: SECRET_KEY
        generateValue: true

      - key: FRONTEND_URL
        sync: false

      - key: LOG_LEVEL
        value: "INFO"

      - key: TMP_DIR
        value: "/tmp/videodl"

      - key: MAX_VIDEO_SECONDS
        value: "3600"

      - key: MAX_FILE_MB
        value: "500"

      - key: FFMPEG_PATH
        value: "/usr/bin/ffmpeg"

      # Ensure Node.js is in PATH at runtime
      - key: PATH
        value: "/opt/render/project/src/.node/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
